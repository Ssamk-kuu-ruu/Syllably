<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Password - Syllably</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-blue: #1a73e8;
        --bg-light-blue: #cce2ff;
        --text-dark-blue: #0f4c9c;
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: linear-gradient(135deg, #bfe3ff 0%, #dbeeff 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        width: min(450px, 92vw);
        background: white;
        border-radius: 24px;
        padding: 35px;
        box-shadow: 0 20px 40px rgba(15, 76, 156, 0.1);
        text-align: center;
      }
      h2 {
        color: var(--text-dark-blue);
        margin-bottom: 10px;
      }
      p {
        font-size: 14px;
        color: #555;
        margin-bottom: 25px;
      }
      form p {
        text-align: left;
        margin-bottom: 15px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-dark-blue);
        margin-bottom: 5px;
      }
      input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 15px;
        outline: none;
      }
      input:focus {
        border-color: var(--primary-blue);
      }
      button {
        width: 100%;
        background-color: var(--primary-blue);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 25px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 15px;
      }
      .errorlist {
        color: #d32f2f;
        list-style: none;
        font-size: 13px;
        text-align: left;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Secure Your Account</h2>
      <p>
        Your current password is your temporary birthday format. Please choose a
        secure password to continue into Syllably.
      </p>

      <form method="POST">
        {% csrf_token %} {% if form.errors %}
        <ul class="errorlist">
          <li>Please fix the validation errors below.</li>
        </ul>
        {% endif %} {{ form.as_p }}

        <button type="submit">Update Password</button>
      </form>
    </div>
  </body>
</html>
