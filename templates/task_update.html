<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Task - Hangarin</title>
    {% include 'includes/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        font-family:
          Segoe UI,
          Tahoma,
          Geneva,
          Verdana,
          sans-serif;
        background: linear-gradient(135deg, #410000, #120000);
        color: #fff;
      }
      .wrap {
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: rgba(24, 0, 0, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 14px;
        padding: 20px;
      }
      .field {
        margin-bottom: 12px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #ffd9d9;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
      }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 9px 14px;
        color: #fff;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.12);
      }
      .btn.save {
        background: rgba(20, 137, 255, 0.75);
      }
      @media (max-width: 640px) {
        .wrap {
          margin: 12px auto;
          padding: 0 10px;
        }
        .card {
          padding: 14px;
        }
        .actions {
          flex-direction: column;
        }
        .btn,
        .btn.save {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2>Edit Task</h2>
        <form method="post">
          {% csrf_token %} {% for field in form %}
          <div class="field">
            {{ field.label_tag }} {{ field }} {% for error in field.errors %}
            <div style="color: #ff9a9a">{{ error }}</div>
            {% endfor %}
          </div>
          {% endfor %}
          <div class="actions">
            <button class="btn save" type="submit">Save Changes</button>
            <a class="btn" href="{% url 'tasks' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
