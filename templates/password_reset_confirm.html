<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set New Password - Hangarin</title>
    {% include 'includes/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
        background: linear-gradient(135deg, #410000, #120000);
        padding: 18px;
        overflow: hidden;
      }
      .card {
        width: min(520px, 94vw);
        background: rgba(25, 0, 0, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        padding: 28px 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(16px);
      }
      .app-logo {
        width: 96px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.44);
        display: block;
        margin: 0 auto 12px;
      }
      h2 {
        text-align: center;
        margin: 6px 0 10px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #f6dada;
        font-weight: 600;
      }
      input[type="password"] {
        width: 100%;
        padding: 13px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        margin-bottom: 14px;
        background: rgba(255, 255, 255, 0.96);
        color: #171717;
      }
      button {
        width: 100%;
        padding: 13px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 14px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #ef4444, #f87171);
        cursor: pointer;
      }
      .errorlist {
        color: #fecaca;
        margin: 0 0 12px;
        padding-left: 18px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        class="app-logo"
        src="{% static 'Logo.jpg' %}"
        alt="Hangarin app logo"
      />
      <h2>Set a new password</h2>
      {% if validlink %}
      <form method="post">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit">Save new password</button>
      </form>
      {% else %}
      <p>The reset link is invalid or has expired.</p>
      <p style="text-align: center">
        <a href="{% url 'password_reset' %}" style="color: #fff"
          >Request a new link</a
        >
      </p>
      {% endif %}
    </div>
  </body>
</html>
