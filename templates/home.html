<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home - Hangarin</title>
    {% include 'includes/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(
          circle at top left,
          #330000,
          #080808 60%,
          #000000 100%
        );
        color: #f8fafc;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .hero {
        background: rgba(0, 0, 0, 0.75);
        border: 1px solid rgba(255, 80, 80, 0.35);
        border-radius: 22px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
        width: min(700px, 92vw);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3rem);
        color: #ffb3b3;
        letter-spacing: 0.5px;
        text-shadow: 0 0 10px rgba(255, 127, 127, 0.5);
      }
      .btn {
        margin-top: 20px;
        padding: 12px 24px;
        border: 1px solid #6b1b1b;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        color: #ffffff;
        background: linear-gradient(90deg, #b91c1c, #991b1b);
        text-decoration: none;
        display: inline-block;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          background 0.25s ease;
      }
      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 24px rgba(189, 63, 63, 0.45);
        background: linear-gradient(90deg, #f87171, #ef4444);
      }
      .meta {
        color: #f0f0f0;
        margin-top: 8px;
      }
      @media (max-width: 640px) {
        .hero {
          padding: 24px 16px;
          border-radius: 14px;
        }
        p {
          font-size: 0.98rem;
        }
        .btn {
          width: 100%;
          text-align: center;
          margin-top: 14px;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>Welcome to Hangarin</h1>
      {% if user.is_authenticated %}
      <p>Hello, {{ user.username }}!</p>
      <a class="btn" href="{% url 'logout' %}">Logout</a>
      {% else %}
      <p class="meta">Please log in to continue to your dashboard.</p>
      <a class="btn" href="{% url 'login' %}">Login</a>
      {% endif %}
    </section>
  </body>
</html>
