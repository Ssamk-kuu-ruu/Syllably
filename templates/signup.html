<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up - Hangarin</title>
    {% include 'includes/pwa_head.html' %}
    <style>
      :root {
        --bg-start: #410000;
        --bg-end: #120000;
        --panel-border: rgba(255, 255, 255, 0.14);
        --text-soft: #f6dada;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100svh;
        color: #fff;
        background:
          radial-gradient(
            circle at top,
            rgba(248, 113, 113, 0.16),
            transparent 36%
          ),
          linear-gradient(135deg, var(--bg-start), var(--bg-end));
        display: grid;
        place-items: center;
        padding: 18px;
        overflow: hidden;
      }
      .card {
        width: min(520px, 94vw);
        background: linear-gradient(
          160deg,
          rgba(41, 0, 0, 0.94),
          rgba(18, 0, 2, 0.92)
        );
        border: 1px solid var(--panel-border);
        border-radius: 26px;
        padding: 28px 24px;
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
      }
      .logo-wrap {
        text-align: center;
        margin-bottom: 12px;
      }
      .app-logo {
        width: 102px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.44);
      }
      h2 {
        text-align: center;
        margin: 6px 0 18px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: var(--text-soft);
        font-weight: 600;
      }
      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 13px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        margin-bottom: 14px;
        background: rgba(255, 255, 255, 0.96);
        color: #171717;
      }
      button {
        width: 100%;
        padding: 13px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 14px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #ef4444, #f87171);
        cursor: pointer;
      }
      .note {
        margin-top: 14px;
        text-align: center;
        color: #e5d5d5;
      }
      .note a {
        color: #fff;
      }
      .errorlist {
        color: #fecaca;
        margin: 0 0 12px;
        padding-left: 18px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo-wrap">
        <img
          class="app-logo"
          src="{% static 'Logo.jpg' %}"
          alt="Hangarin app logo"
        />
      </div>
      <h2>Create account</h2>
      <form method="post">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit">Sign Up</button>
      </form>
      <p class="note">
        Already have an account? <a href="{% url 'login' %}">Log in</a>
      </p>
    </div>
  </body>
</html>
