<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar - Syllably</title>
    {% include 'includes/pwa_head.html' %}
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-blue: #1a73e8;
        --bg-light-blue: #cce2ff;
        --text-dark-blue: #0f4c9c;
        --white: #ffffff;
        --border-dark: #000000;
        --accent-yellow: #fff3a1;
        --placeholder-blue: #7faee5;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: linear-gradient(135deg, #bfe3ff 0%, #dbeeff 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .calendar-canvas {
        width: 95%;
        max-width: 1000px;
        margin-top: 40px;
        background: var(--bg-light-blue);
        border: 3px solid var(--border-dark);
        border-radius: 32px;
        padding: 40px;
        box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        font-family: "Playfair Display", serif;
      }

      .month-year {
        font-size: 48px;
        font-style: italic;
        color: var(--text-dark-blue);
      }
      .add-event-btn {
        background-color: var(--primary-blue);
        color: white;
        padding: 12px 24px;
        border-radius: 20px;
        border: 2px solid var(--border-dark);
        font-weight: 700;
        cursor: pointer;
        box-shadow: 3px 3px 0px var(--border-dark);
        z-index: 50; /* Ensure button stays above calendar content */
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 10px;
      }
      .day-label {
        text-align: center;
        font-weight: 800;
        padding: 10px;
        border: 2px solid var(--border-dark);
        background: var(--white);
        border-radius: 12px;
      }
      .calendar-day {
        background: var(--white);
        border: 2px solid var(--border-dark);
        border-radius: 16px;
        height: 120px;
        padding: 10px;
        font-weight: 700;
      }
      .calendar-day.active {
        background-color: var(--accent-yellow);
      }

      /* Bottom Nav Dock - Fixed Position Fix */
      .bottom-overlay-dock {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--white);
        border: 2.5px solid var(--border-dark);
        border-radius: 24px;
        display: flex;
        align-items: center;
        padding: 10px 16px;
        gap: 8px;
        box-shadow:
          0px 12px 32px rgba(15, 76, 156, 0.15),
          4px 6px 0px var(--border-dark);
        z-index: 100;
        min-width: 420px;
        justify-content: space-around;
      }

      .dock-item-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        color: var(--placeholder-blue);
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        border-radius: 16px;
        border: 2px solid transparent;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .dock-item-link svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.5;
      }

      .dock-item-link.active {
        background-color: var(--primary-blue);
        color: var(--white);
        border-color: var(--border-dark);
        box-shadow: 2px 2px 0px var(--border-dark);
      }

      .dock-item-link.active svg {
        fill: var(--primary-blue);
        stroke: var(--white);
      }
      .dock-item-link:not(.active):hover {
        background-color: var(--bg-light-blue);
        color: var(--text-dark-blue);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <main class="calendar-canvas">
      <header class="calendar-header">
        <div class="month-year">June 2026</div>
        <button class="add-event-btn" onclick="alert('Event Modal Triggered')">
          + Event
        </button>
      </header>

      <div class="calendar-grid">
        <div class="day-label">Mon</div>
        <div class="day-label">Tue</div>
        <div class="day-label">Wed</div>
        <div class="day-label">Thu</div>
        <div class="day-label">Fri</div>
        <div class="day-label">Sat</div>
        <div class="day-label">Sun</div>

        {% for i in "123456789012345678901234567890" %}
        <div
          class="calendar-day {% if forloop.counter == 5 %}active{% endif %}"
        >
          {{ forloop.counter }}
        </div>
        {% endfor %}
      </div>
    </main>

    <nav class="bottom-overlay-dock">
      <a
        href="{% url 'home' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z" />
        </svg>
        <span>Home</span>
      </a>
      <a
        href="{% url 'courses' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'courses' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
          />
        </svg>
        <span>Courses</span>
      </a>
      <a
        href="{% url 'calendar' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'calendar' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span>Calendar</span>
      </a>
      <a
        href="{% url 'sched' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'sched' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        <span>Schedule</span>
      </a>
      <a
        href="{% url 'settings' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
        <span>Settings</span>
      </a>
    </nav>
  </body>
</html>
