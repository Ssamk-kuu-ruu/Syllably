<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password - Hangarin</title>
    {% include 'includes/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
        background: linear-gradient(135deg, #410000, #120000);
        padding: 12px;
        overflow: hidden;
      }
      .card {
        width: min(520px, 92vw);
        background: rgba(25, 0, 0, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        padding: 22px 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(16px);
      }
      .logo-wrap {
        text-align: center;
        margin-bottom: 12px;
      }
      .app-logo {
        width: 82px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.44);
      }
      h2 {
        text-align: center;
        margin: 6px 0 8px;
      }
      .intro {
        color: #e9d7d7;
        text-align: center;
        margin: 0 0 12px;
        font-size: 0.94rem;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #f6dada;
        font-weight: 600;
      }
      form {
        display: grid;
        gap: 10px;
      }
      form p {
        margin: 0;
      }
      input[type="email"] {
        width: 100%;
        padding: 12px 13px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        margin-bottom: 0;
        background: rgba(255, 255, 255, 0.96);
        color: #171717;
      }
      .helptext {
        display: none;
      }
      button {
        width: 100%;
        padding: 13px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 14px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #ef4444, #f87171);
        cursor: pointer;
      }
      .back {
        margin: 10px 0 0;
        text-align: center;
      }
      .back a {
        color: #fff;
      }
      .errorlist {
        color: #fecaca;
        margin: 0 0 12px;
        padding-left: 18px;
      }
      @media (max-height: 700px) {
        .card {
          padding: 18px 14px;
        }
        .app-logo {
          width: 74px;
        }
        h2 {
          margin: 4px 0 6px;
        }
        .intro {
          margin-bottom: 8px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo-wrap">
        <img
          class="app-logo"
          src="{% static 'Logo.jpg' %}"
          alt="Hangarin app logo"
        />
      </div>
      <h2>Forgot password?</h2>
      <p class="intro">Enter your email and we’ll generate a reset link.</p>
      <form method="post">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit">Send reset link</button>
      </form>
      <p class="back"><a href="{% url 'login' %}">Back to login</a></p>
    </div>
  </body>
</html>
