<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule - Syllably</title>
    {% include 'includes/pwa_head.html' %}
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-blue: #1a73e8;
        --bg-light-blue: #cce2ff;
        --text-dark-blue: #0f4c9c;
        --white: #ffffff;
        --border-dark: #000000;
        --accent-yellow: #fff3a1;
        --placeholder-blue: #7faee5;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: linear-gradient(135deg, #bfe3ff 0%, #dbeeff 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .main-content-canvas {
        width: 100%;
        max-width: 800px;
        padding: 40px 24px 120px 24px;
      }

      /* Schedule Header */
      .page-header-badge {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        background-color: var(--white);
        border: 2.5px solid var(--border-dark);
        padding: 10px 24px;
        border-radius: 20px;
        box-shadow: 4px 4px 0px var(--border-dark);
        margin-bottom: 40px;
      }

      .page-header-badge h1 {
        font-size: 22px;
        color: var(--primary-blue);
      }

      /* Timeline Layout */
      .timeline-container {
        background: var(--white);
        border: 2.5px solid var(--border-dark);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 6px 6px 0px var(--border-dark);
      }

      .time-slot {
        display: flex;
        gap: 20px;
        padding: 20px 0;
        border-bottom: 1px dashed var(--placeholder-blue);
      }

      .time-label {
        font-weight: 800;
        color: var(--text-dark-blue);
        min-width: 80px;
      }
      .event-card {
        background: var(--bg-light-blue);
        padding: 15px;
        border-radius: 12px;
        border: 1.5px solid var(--border-dark);
        flex: 1;
      }

      /* Bottom Nav Dock */
      .bottom-overlay-dock {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--white);
        border: 2.5px solid var(--border-dark);
        border-radius: 24px;
        display: flex;
        align-items: center;
        padding: 10px 16px;
        gap: 8px;
        box-shadow:
          0px 12px 32px rgba(15, 76, 156, 0.15),
          4px 6px 0px var(--border-dark);
        z-index: 100;
        min-width: 420px;
        justify-content: space-around;
      }

      .dock-item-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        color: var(--placeholder-blue);
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        border-radius: 16px;
        border: 2px solid transparent;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .dock-item-link svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.5;
      }

      .dock-item-link.active {
        background-color: var(--primary-blue);
        color: var(--white);
        border-color: var(--border-dark);
        box-shadow: 2px 2px 0px var(--border-dark);
      }

      .dock-item-link.active svg {
        fill: var(--primary-blue);
        stroke: var(--white);
      }
      .dock-item-link:not(.active):hover {
        background-color: var(--bg-light-blue);
        color: var(--text-dark-blue);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <main class="main-content-canvas">
      <div class="page-header-badge">
        <h1>Schedule</h1>
      </div>

      <div class="timeline-container">
        <div class="time-slot">
          <div class="time-label">08:00 AM</div>
          <div class="event-card">Software Engineering - Lecture</div>
        </div>
        <div class="time-slot">
          <div class="time-label">10:30 AM</div>
          <div class="event-card">Advanced Calculus - Lab</div>
        </div>
        <div class="time-slot">
          <div class="time-label">02:00 PM</div>
          <div class="event-card">Creative Writing Workshop</div>
        </div>
      </div>
    </main>

    <nav class="bottom-overlay-dock">
      <a
        href="{% url 'home' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z" />
        </svg>
        <span>Home</span>
      </a>
      <a
        href="{% url 'courses' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'courses' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
          />
        </svg>
        <span>Courses</span>
      </a>
      <a
        href="{% url 'calendar' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'calendar' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span>Calendar</span>
      </a>
      <a
        href="{% url 'sched' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'sched' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        <span>Schedule</span>
      </a>
      <a
        href="{% url 'settings' %}"
        class="dock-item-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
        <span>Settings</span>
      </a>
    </nav>
  </body>
</html>
