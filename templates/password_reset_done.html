<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Sent - Hangarin</title>
    {% include 'includes/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #fff;
        background: linear-gradient(135deg, #410000, #120000);
        padding: 18px;
        overflow: hidden;
      }
      .card {
        width: min(520px, 94vw);
        background: rgba(25, 0, 0, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        padding: 28px 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(16px);
        text-align: center;
      }
      .app-logo {
        width: 96px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.44);
      }
      h2 {
        margin: 14px 0 10px;
      }
      p {
        color: #e9d7d7;
        line-height: 1.5;
      }
      a {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        class="app-logo"
        src="{% static 'Logo.jpg' %}"
        alt="Hangarin app logo"
      />
      <h2>Check your email</h2>
      <p>If the email exists, we sent a password reset link to it.</p>
      <p><a href="{% url 'login' %}">Back to login</a></p>
    </div>
  </body>
</html>
