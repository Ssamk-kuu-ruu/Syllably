<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Delete Task - Hangarin</title>
    {% include 'includes/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        font-family:
          Segoe UI,
          Tahoma,
          Geneva,
          Verdana,
          sans-serif;
        background: linear-gradient(135deg, #410000, #120000);
        color: #fff;
      }
      .wrap {
        max-width: 700px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: rgba(24, 0, 0, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 14px;
        padding: 20px;
      }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 9px 14px;
        color: #fff;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.12);
      }
      .btn.delete {
        background: rgba(199, 38, 38, 0.82);
      }
      @media (max-width: 640px) {
        .wrap {
          margin: 12px auto;
          padding: 0 10px;
        }
        .card {
          padding: 14px;
        }
        .actions {
          flex-direction: column;
        }
        .btn,
        .btn.delete {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2>Delete Task</h2>
        <p>
          Are you sure you want to delete <strong>{{ object.title }}</strong>?
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="actions">
            <button class="btn delete" type="submit">Yes, Delete</button>
            <a class="btn" href="{% url 'tasks' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
